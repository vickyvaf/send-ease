[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[rpc_endpoints]
celo-sepolia = "https://forno.celo-sepolia.celo-testnet.org/"
celo = "https://forno.celo.org"

# Etherscan API V2: key from https://etherscan.io/apidashboard (Celo = chain 42220).
# Do NOT use https://api.celoscan.io/api — that V1 URL is deprecated.
[etherscan]
celo = { key = "${ETHERSCAN_API_KEY}", chain = 42220 }
celo-sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11142220 }
